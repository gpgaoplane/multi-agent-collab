# .collab/config.yml — runtime behavior knobs for multi-agent-collab.
# Edit in place; this file is user-owned (not overwritten by re-init).
---
strict: false             # true → pre-commit blocks on missing Task Receipt
presence_required: false  # reserved for v0.5.0
update_channel: npm       # npm | none
rotate_at_lines: 300      # collab-check warns when a managed file exceeds this
rotate_keep_recent: 8     # entries kept in live log on rotation; older entries archived
