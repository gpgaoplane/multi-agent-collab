name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/hooks/* tests/*.sh
      - name: Run test suite
        run: ./tests/run-all.sh
