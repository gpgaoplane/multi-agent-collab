name: publish

on:
  push:
    tags: ['v*']

# Serialize publishes; never cancel in-flight (publish is non-idempotent).
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # reserved for future OIDC-based npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/hooks/* tests/*.sh
      - name: Test
        run: ./tests/run-all.sh
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "Tag $TAG_VERSION != package.json $PKG_VERSION" >&2
            exit 1
          fi
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
